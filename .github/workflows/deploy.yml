name: Build & Deploy to K3s

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: taskapi

jobs:
  test:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r app/requirements.txt httpx pytest

      - name: Run health check on current deployment
        run: curl -sf http://localhost:30081/health || echo "No previous deployment"

  build-and-deploy:
    needs: test
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          sudo docker build -t $IMAGE_NAME:${{ github.sha }} -t $IMAGE_NAME:latest .

      - name: Import image into K3s
        run: |
          sudo docker save $IMAGE_NAME:${{ github.sha }} | sudo k3s ctr images import -

      - name: Deploy to K3s
        run: |
          sudo kubectl set image deployment/taskapi \
            taskapi=docker.io/library/$IMAGE_NAME:${{ github.sha }} \
            -n app
          sudo kubectl rollout status deployment/taskapi -n app --timeout=60s

      - name: Verify deployment
        run: |
          sudo kubectl get pods -n app -l app=taskapi
          echo "---"
          sleep 5
          curl -sf http://localhost:30081/health
          echo ""
          echo "Deploy complete: $IMAGE_NAME:${{ github.sha }}"

      - name: Cleanup old images
        run: |
          sudo docker image prune -f
